<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordPress Credits Dashboard</title>
<meta name="description" content="Live dashboard tracking WordPress Credits program: students, mentors, institutions, contributions, and translation activity.">
<meta property="og:title" content="WordPress Credits Dashboard">
<meta property="og:description" content="Live dashboard tracking WordPress Credits program: students, mentors, institutions, contributions, and translation activity.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wordpress.github.io/WPCredits-Tracker/">
<meta property="og:image" content="https://s.w.org/style/images/about/WordPress-logotype-wmark.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="WordPress Credits Dashboard">
<meta name="twitter:description" content="Live dashboard tracking WordPress Credits program: students, mentors, institutions, contributions, and translation activity.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--wp-blue:#0073aa;--wp-blue-dark:#005a87;--wp-green:#00a32a;--wp-orange:#dba617;--wp-red:#d63638;--bg:#f0f0f1;--card-bg:#fff;--text:#1d2327;--text-light:#646970;--border:#c3c4c7;--row-hover:#f6f7f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,var(--wp-blue),var(--wp-blue-dark));color:#fff;padding:28px 32px;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;align-items:center;gap:16px}
.header .logo-svg{height:36px;width:auto;flex-shrink:0}
.header h1{font-size:24px;font-weight:700}
.nav{background:#fff;border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 24px;overflow-x:auto}
.nav-item{padding:14px 24px;font-size:14px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;user-select:none;transition:all .15s;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--row-hover)}
.nav-item.active{color:var(--wp-blue);border-bottom-color:var(--wp-blue)}
.content{padding:24px;max-width:1400px;margin:0 auto}
.section{display:none}.section.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.card .num{font-size:32px;font-weight:800;color:var(--wp-blue)}
.card .lbl{font-size:11px;color:var(--text-light);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.chart-container{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px}
.chart-container h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
@media(max-width:900px){.charts-row{grid-template-columns:1fr}}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{width:130px;text-align:right;font-size:13px;font-weight:500;color:var(--text);flex-shrink:0}
.bar-track{flex:1;height:28px;background:#f0f0f1;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;transition:width .6s ease}
.controls{margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls select,.controls input{padding:8px 14px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:#fff}
.controls select{min-width:280px}.controls input{width:220px}
table{width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;border-collapse:separate;border-spacing:0;overflow:hidden;font-size:13px}
thead th{background:#f6f7f7;padding:10px 14px;text-align:left;font-weight:600;color:var(--text-light);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th .sort-arrow{margin-left:4px;font-size:10px}
tbody td{padding:10px 14px;border-bottom:1px solid #e8e8e8;vertical-align:middle}
tbody tr:hover{background:var(--row-hover)}
tbody tr:last-child td{border-bottom:none}
.team-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;margin:1px 3px;white-space:nowrap}
.team-polyglots{background:#e8f5e9;color:#1b5e20}
.team-default{background:#e3f2fd;color:#0d47a1}
.grad-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#fff3e0;color:#e65100;margin-left:4px}
.sponsored-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#e8f5e9;color:#1b5e20}
.profile-link{color:var(--wp-blue);text-decoration:none}
.profile-link:hover{text-decoration:underline}
.stats-cell{text-align:right;font-variant-numeric:tabular-nums}
.stats-cell.has-value{font-weight:600}
.stats-zero{color:#bbb}
.no-data{color:var(--text-light);font-style:italic;padding:40px;text-align:center}
.trans-chart-wrap{display:flex;gap:32px;align-items:center;flex-wrap:wrap;justify-content:center}
.donut-container{width:220px;height:220px;position:relative}
.donut-container svg{width:100%;height:100%}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .big{font-size:28px;font-weight:800;color:var(--text)}
.donut-center .sub{font-size:11px;color:var(--text-light);text-transform:uppercase}
.legend{display:flex;flex-direction:column;gap:12px}
.legend-item{display:flex;align-items:center;gap:10px;font-size:14px}
.legend-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.legend-num{font-weight:700;font-size:16px}
.course-bar{display:inline-block;height:18px;border-radius:4px;background:var(--wp-blue);min-width:2px;vertical-align:middle;margin-right:8px}
.lang-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;background:#f3e5f5;color:#6a1b9a;margin:1px 2px}
.student-list{font-size:12px;line-height:1.6}
.student-list .s-active{color:var(--wp-blue)}
.student-list .s-grad{color:#e65100}
#instMap{width:100%;height:480px;border-radius:8px;z-index:1}
.leaflet-popup-content{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;line-height:1.6}
.leaflet-popup-content h4{margin:0 0 6px;font-size:14px;color:var(--wp-blue);border-bottom:1px solid var(--border);padding-bottom:4px}
.leaflet-popup-content ul{margin:0;padding:0 0 0 16px}
.leaflet-popup-content li{margin:2px 0;color:var(--text)}
.footer{text-align:center;padding:20px;color:var(--text-light);font-size:12px}
@media(max-width:768px){.nav{overflow-x:auto}.nav-item{padding:10px 14px;font-size:13px}.content{padding:16px}.bar-label{width:80px;font-size:11px}}
</style>
</head>

<script>
const D = /*DATA_BLOB*/;
const INST_MARKERS = /*INST_MARKERS*/;

function initInstMap() {
  const map = L.map('instMap', {
    scrollWheelZoom: false,
    zoomControl: true
  }).setView([30, 10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const wpIcon = L.divIcon({
    className: 'wp-marker',
    html: '<div style="background:#0073aa;width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:dashicons,sans-serif"></div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });

  const wpIconMulti = function(count) {
    return L.divIcon({
      className: 'wp-marker',
      html: '<div style="background:#0073aa;width:32px;height:32px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px">' + count + '</div>',
      iconSize: [32, 32],
      iconAnchor: [16, 16],
      popupAnchor: [0, -18]
    });
  };

  INST_MARKERS.forEach(m => {
    const icon = m.institutions.length > 1 ? wpIconMulti(m.institutions.length) : wpIcon;
    const list = m.institutions.map(n => '<li>' + n + '</li>').join('');
    const popup = '<h4>' + m.city + ', ' + m.country + '</h4><ul>' + list + '</ul>';
    L.marker([m.lat, m.lng], { icon: icon })
      .addTo(map)
      .bindPopup(popup, { maxWidth: 280 });
  });

  // Invalidate size when tab becomes visible
  const observer = new MutationObserver(() => {
    if (document.getElementById('sec-global').classList.contains('active')) {
      setTimeout(() => map.invalidateSize(), 100);
    }
  });
  observer.observe(document.getElementById('sec-global'), { attributes: true, attributeFilter: ['class'] });
  // Also handle initial load
  setTimeout(() => map.invalidateSize(), 200);
}

// ─── NAV SWITCHING ─────────────────────────────────

// ─── GLOBAL INSTITUTION FILTER SYNC ──────────────────
(function(){
  // Map student names to institutions for mentor filtering
  const studentInstMap = {};
  D.students.forEach(s => { if(s.name && s.institution) studentInstMap[s.name.trim().toLowerCase()] = s.institution; });

  function getInstForMentor(m) {
    // Check if any of the mentor's students belong to a given institution
    const names = (m.students || []).concat((m.activeStudents||[]).map(s=>s.name)).concat((m.gradStudents||[]).map(s=>s.name));
    const insts = new Set();
    names.forEach(n => { if(n) { const inst = studentInstMap[n.trim().toLowerCase()]; if(inst) insts.add(inst); }});
    return [...insts];
  }

  // Attach institution list to each mentor for filtering
  D.mentors.forEach(m => { m._institutions = getInstForMentor(m); });

  function syncInstitutionFilter(inst, source) {
    // Sync Contributions and Learn institution dropdowns
    ['cI','lI'].forEach(id => {
      const sel = document.getElementById(id);
      if(sel && sel.id !== source) {
        sel.value = inst;
        sel.dispatchEvent(new Event('change'));
      }
    });

    // Filter mentors
    filterMentors(inst);
  }

  function filterMentors(inst) {
    const mS = document.getElementById('mS');
    const q = mS ? mS.value.toLowerCase() : '';
    let f = D.mentors;
    if(inst !== 'all') f = f.filter(m => m._institutions.includes(inst));
    if(q) f = f.filter(m => m.name.toLowerCase().includes(q) || (m.country_normalized||'').toLowerCase().includes(q));
    f.sort((a,b) => a.name.localeCompare(b.name));

    const tb = document.getElementById('mB');
    if(!tb) return;
    if(!f.length){ tb.innerHTML='<tr><td colspan="5" class="no-data">No mentors found</td></tr>'; return; }
    tb.innerHTML = f.map(m => {
      const nm = m.wp_username ? `<a class="profile-link" href="https://profiles.wordpress.org/${m.wp_username}/" target="_blank">${m.name}</a>` : m.name;
      const langs = m.languages.length ? m.languages.map(l=>`<span class="lang-tag">${l}</span>`).join(' ') : '<span class="stats-zero">—</span>';
      const slist = [];
      (m.activeStudents||[]).forEach(s => slist.push(`<span class="s-active">${s.name}</span>`));
      (m.gradStudents||[]).forEach(s => slist.push(`<span class="s-grad">${s.name}</span>`));
      const students = slist.length ? `<div class="student-list">${slist.join(', ')}</div>` : `<span class="stats-zero">${m.studentCount||0} students</span>`;
      return `<tr><td>${nm}</td><td>${m.country_normalized||m.country||''}</td><td>${langs}</td><td>${students}</td><td>${m.sponsored?'<span class="sponsored-badge">Sponsored</span>':''}</td></tr>`;
    }).join('');
  }

  // Listen on Contributions and Learn institution dropdowns to sync
  ['cI','lI'].forEach(id => {
    const sel = document.getElementById(id);
    if(sel) {
      sel.addEventListener('change', function() {
          const val = sel.value;
          ['cI','lI'].forEach(oid => {
            const other = document.getElementById(oid);
            if(other && oid !== id) other.value = val;
          });
          filterMentors(val);
      });
    }
  });

  // Listen on mentor search too
  const mS = document.getElementById('mS');
  if(mS) {
    mS.addEventListener('input', function() {
      const inst = document.getElementById('cI') ? document.getElementById('cI').value : 'all';
      filterMentors(inst);
    });
  }

})();

document.querySelectorAll('.nav-item').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.section).classList.add('active');
  });
});

// Team color helper
const TEAM_COLORS={"Polyglots":"#1b5e20","Documentation":"#0d47a1","Photos":"#4a148c","Design":"#e65100","Core":"#b71c1c","Community":"#00695c","Mobile":"#283593","TV":"#4e342e","Training":"#f57f17","Plugins":"#1565c0","Support":"#2e7d32","Test":"#c62828","Themes":"#6a1b9a"};
function tc(name){return TEAM_COLORS[name]||'#546e7a';}

// ─── SECTION 1: GLOBAL ───────────────────────────────
(function(){
  const g = D.global;
  const el = document.getElementById('sec-global');
  el.innerHTML = `
    <div class="cards">
      <div class="card"><div class="num" id="ovActive">${g.activeStudents}</div><div class="lbl">Active Students</div></div>
      <div class="card"><div class="num">${g.graduates}</div><div class="lbl">Graduates</div></div>
      <div class="card"><div class="num">${g.dropouts!=null?g.dropouts:'—'}</div><div class="lbl">Dropped Out</div></div>
      <div class="card"><div class="num">${g.totalHours.toLocaleString()}</div><div class="lbl">Contribution Hours</div></div>
      <div class="card"><div class="num">${g.partnerInstitutions}</div><div class="lbl">Institutions</div></div>
      <div class="card"><div class="num">${Object.keys(g.instCountries||{}).length}</div><div class="lbl">Countries</div></div>
      <div class="card"><div class="num">${g.activeMentors}</div><div class="lbl">Active Mentors</div></div>
      <div class="card"><div class="num">${g.vettedMentors!=null?g.vettedMentors:'—'}</div><div class="lbl">Vetted Mentors</div></div>
      <div class="card"><div class="num">${g.sponsorCount}</div><div class="lbl">Sponsors</div></div>
      <div class="card"><div class="num">${g.totalCourses.toLocaleString()}</div><div class="lbl">Learn Courses Completed</div></div>
    </div>
    <div class="chart-container">
      <h3>Growth Over Time</h3>
      <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px;font-size:12px;color:var(--text-light)">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75"></span>Joined</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD"></span>Graduated</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:3px;background:#D85A30;display:inline-block"></span>Cumulative joined</span>
      </div>
      <div style="position:relative;height:320px"><canvas id="growthChart"></canvas></div>
    </div>
    <div class="charts-row">
      <div class="chart-container"><h3>Students by Contribution Team</h3><div class="bar-chart" id="teamChart"></div></div>
      <div class="chart-container"><h3>Students by Field of Study</h3><div id="fosChart"></div></div>
    </div>

    <div class="chart-container"><h3>Institutions Around the World</h3><div id="instMap"></div></div>
  `;
  // Growth over time (joining vs graduating, by month)
  (function(){
    var gr = D.growth, cv = document.getElementById('growthChart');
    if (!gr || !cv || !gr.months || !gr.months.length || typeof Chart === 'undefined') return;
    new Chart(cv, {
      data: { labels: gr.months, datasets: [
        { type:'bar', label:'Joined', data:gr.joined, backgroundColor:'#1D9E75', yAxisID:'y' },
        { type:'bar', label:'Graduated', data:gr.graduated, backgroundColor:'#378ADD', yAxisID:'y' },
        { type:'line', label:'Cumulative joined', data:gr.cumulativeJoined, borderColor:'#D85A30', backgroundColor:'#D85A30', borderWidth:2, tension:0.3, pointRadius:2, yAxisID:'y1' }
      ]},
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
        scales:{ x:{ grid:{ display:false }, ticks:{ autoSkip:true, maxRotation:45, minRotation:45 } },
          y:{ beginAtZero:true, title:{ display:true, text:'per month' } },
          y1:{ position:'right', beginAtZero:true, grid:{ drawOnChartArea:false }, title:{ display:true, text:'cumulative' } } } }
    });
  })();
  // Team chart
  const teams = Object.entries(g.teamDistribution).sort((a,b) => b[1]-a[1]);
  const mx = teams[0]?teams[0][1]:1;
  document.getElementById('teamChart').innerHTML = teams.map(([n,c]) => `<div class="bar-row"><div class="bar-label">${n}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(c/mx*100,8)}%;background:${tc(n)}">${c}</div></div></div>`).join('');
  // Field of Study chart (computed dynamically from student data)
  const activeStatuses = new Set(['in sensei','in sensei self-onboarding','in sensei 50h','pending graduation']);
  const fosMap = {};
  D.students.forEach(s => {
    if (!s.is_graduate && !activeStatuses.has((s.status||'').trim().toLowerCase())) return;
    const fos = s.fieldOfStudy || 'Unspecified';
    if (!fosMap[fos]) fosMap[fos] = {active:0, graduated:0};
    if (s.is_graduate) fosMap[fos].graduated++;
    else fosMap[fos].active++;
  });
  const fosEntries = Object.entries(fosMap).map(([k,v]) => [k, v.active + v.graduated, v.active, v.graduated]).sort((a,b) => b[1] - a[1]);
  const fosTotal = fosEntries.reduce((a,e) => a + e[1], 0);
  const fosColors = {'Technology & Engineering':'#0073aa','Languages, Communication & Writing':'#00a32a','Business, Marketing & Management':'#dba617','Design & Creative Media':'#9b59b6','Humanities & Social Sciences':'#e67e22','Arts & Architecture':'#d63638','Unspecified':'#546e7a'};
  const fosR=70,fosCx=90,fosCy=90,fosSw=24,fosCI=2*Math.PI*fosR;
  let fosOff=0,fosPaths='';
  fosEntries.forEach(([n,c])=>{if(!c)return;const dl=fosCI*c/fosTotal;fosPaths+=`<circle cx="${fosCx}" cy="${fosCy}" r="${fosR}" fill="none" stroke="${fosColors[n]||'#546e7a'}" stroke-width="${fosSw}" stroke-dasharray="${dl} ${fosCI-dl}" stroke-dashoffset="${-fosOff}" transform="rotate(-90 ${fosCx} ${fosCy})"/>`;fosOff+=dl;});
  const fosLegend = fosEntries.map(([n,c,act,grad]) => {
    const pct = fosTotal ? Math.round(c/fosTotal*100) : 0;
    const gradNote = grad > 0 ? ` <span style="color:#e65100;font-size:11px">(${grad} grad.)</span>` : '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f1"><div style="width:14px;height:14px;border-radius:4px;background:${fosColors[n]||'#546e7a'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--text)">${n}</div></div><div style="font-size:15px;font-weight:700;color:var(--text);white-space:nowrap">${c} <span style="font-size:11px;font-weight:400;color:var(--text-light)">(${pct}%)</span>${gradNote}</div></div>`;
  }).join('');
  document.getElementById('fosChart').innerHTML = `<div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap"><div style="width:180px;height:180px;position:relative;flex-shrink:0"><svg viewBox="0 0 180 180">${fosPaths}</svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center"><div style="font-size:24px;font-weight:800;color:var(--text)">${fosTotal}</div><div style="font-size:10px;color:var(--text-light);text-transform:uppercase">Students</div></div></div><div style="flex:1;min-width:200px">${fosLegend}</div></div>`;
    // Maps
  initInstMap();
})();

// ─── SECTION 2: CONTRIBUTIONS ─────────────────────────
(function(){
  const el = document.getElementById('sec-contributions');
  const t = D.translationTotals;
  const transStudents = D.students.filter(s => s.total_strings > 0).length;
  
  el.innerHTML = '<div class="cards">' +
    '<div class="card"><div class="num">' + (t.total||0).toLocaleString() + '</div><div class="lbl">Translation Strings</div></div>' +
    '<div class="card"><div class="num">' + transStudents + '</div><div class="lbl">Translating Students</div></div>' +
  '</div>' +
  '<div class="chart-container"><h3>Translation Activity</h3><div class="trans-chart-wrap"><div class="donut-container" id="dC"></div><div class="legend" id="dL"></div></div></div>' +
  '<div class="controls">' +
    '<select id="cI"><option value="all">All Institutions</option>' + D.institutions.map(function(i){ return '<option value="' + i + '">' + i + '</option>'; }).join('') + '</select>' +
    '<select id="cCo"><option value="all">All Cohorts</option>' + (D.cohorts||[]).map(function(c){ return '<option value="' + c + '">' + c + '</option>'; }).join('') + '</select>' +
    '<input type="text" id="cS" placeholder="Search by name...">' +
  '</div>' +
  '<table><thead><tr>' +
    '<th data-col="name">Student <span class="sort-arrow"></span></th>' +
    '<th>Institution</th>' +
    '<th>Team(s)</th>' +
    '<th data-col="translations" style="text-align:right">Translations <span class="sort-arrow"></span></th>' +
    '<th>Graduate</th>' +
  '</tr></thead><tbody id="cB"></tbody></table>';

  // Translation donut chart
  function drawDonut(sg, tr, rv) {
    var tot = sg + tr + rv;
    if (!tot) { document.getElementById('dC').innerHTML = '<div class="no-data">No data</div>'; document.getElementById('dL').innerHTML = ''; return; }
    var segs = [{v:sg,c:'#0073aa',l:'Suggested'},{v:tr,c:'#00a32a',l:'Translated'},{v:rv,c:'#9b59b6',l:'Reviewed'}];
    var r=90,cx=110,cy=110,sw=30,ci=2*Math.PI*r; var o=0,p='';
    segs.forEach(function(s){ if(!s.v)return; var dl=ci*s.v/tot; p+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+dl+' '+(ci-dl)+'" stroke-dashoffset="'+(-o)+'" transform="rotate(-90 '+cx+' '+cy+')"/>'; o+=dl; });
    document.getElementById('dC').innerHTML = '<svg viewBox="0 0 220 220">' + p + '</svg><div class="donut-center"><div class="big">' + tot.toLocaleString() + '</div><div class="sub">Strings</div></div>';
    document.getElementById('dL').innerHTML = segs.map(function(s){ return '<div class="legend-item"><div class="legend-dot" style="background:'+s.c+'"></div><div><div class="legend-num">'+s.v.toLocaleString()+'</div><div style="font-size:12px;color:var(--text-light)">'+s.l+'</div></div></div>'; }).join('');
  }
  drawDonut(t.suggested, t.translated, t.reviewed);

  // Table rendering
  var sc = 'name', sd = 'asc';
  function r() {
    var inst = document.getElementById('cI').value;
    var cohort = document.getElementById('cCo').value;
    var q = document.getElementById('cS').value.toLowerCase();
    var f = D.students.slice(); // Show ALL students now
    if (inst !== 'all') f = f.filter(function(s){ return s.institution === inst; });
    if (cohort !== 'all') f = f.filter(function(s){ return s.cohort === cohort; });
    if (q) f = f.filter(function(s){ return s.name.toLowerCase().includes(q) || (s.wp_username||'').toLowerCase().includes(q); });
    
    // Sort
    f.sort(function(a, b) {
      var va, vb;
      if (sc === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
      else if (sc === 'translations') { va = a.total_strings || 0; vb = b.total_strings || 0; }
      else { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
      return va < vb ? (sd === 'asc' ? -1 : 1) : va > vb ? (sd === 'asc' ? 1 : -1) : 0;
    });

    // Update donut for filtered view
    if (inst !== 'all') {
      var is = D.students.filter(function(s){ return s.institution === inst; });
      drawDonut(
        is.reduce(function(a,s){ return a + (s.suggested||0); }, 0),
        is.reduce(function(a,s){ return a + (s.translated||0); }, 0),
        is.reduce(function(a,s){ return a + (s.reviewed||0); }, 0)
      );
    } else {
      drawDonut(t.suggested, t.translated, t.reviewed);
    }

    var tb = document.getElementById('cB');
    if (!f.length) { tb.innerHTML = '<tr><td colspan="5" class="no-data">No students found</td></tr>'; return; }
    var fm = function(v) { return v ? '<span class="has-value">' + v.toLocaleString() + '</span>' : '<span class="stats-zero">0</span>'; };
    tb.innerHTML = f.map(function(s) {
      var nm = s.wp_username ? '<a class="profile-link" href="https://profiles.wordpress.org/' + s.wp_username + '/" target="_blank">' + s.name + '</a>' : s.name;
      var tm = (s.teams||[]).map(function(t){ return '<span class="team-badge ' + (t==='Polyglots'?'team-polyglots':'team-default') + '">' + t + '</span>'; }).join(' ') || '<span class="stats-zero">—</span>';
      return '<tr>' +
        '<td>' + nm + '</td>' +
        '<td>' + s.institution + '</td>' +
        '<td>' + tm + '</td>' +
        '<td class="stats-cell">' + fm(s.total_strings) + '</td>' +
        '<td>' + (s.is_graduate ? '<span class="grad-badge">Graduate</span>' : '') + '</td>' +
      '</tr>';
    }).join('');

    // Update sort arrows
    document.querySelectorAll('#sec-contributions thead th[data-col]').forEach(function(th) {
      var a = th.querySelector('.sort-arrow');
      if (a) a.textContent = th.dataset.col === sc ? (sd === 'asc' ? '▲' : '▼') : '';
    });
  }

  // Event listeners
  document.getElementById('cI').addEventListener('change', r);
  document.getElementById('cCo').addEventListener('change', r);
  document.getElementById('cS').addEventListener('input', r);
  document.querySelectorAll('#sec-contributions thead th[data-col]').forEach(function(th) {
    th.addEventListener('click', function() {
      var c = th.dataset.col;
      if (sc === c) sd = sd === 'asc' ? 'desc' : 'asc';
      else { sc = c; sd = c === 'name' ? 'asc' : 'desc'; }
      r();
    });
  });
  
  r();
})();

// ─── SECTION 4: LEARN ─────────────────────────────────
(function(){
  const el=document.getElementById('sec-learn');
  const tc=D.students.reduce((a,s)=>a+(s.courses||0),0);
  const wc=D.students.filter(s=>s.courses>0).length;
  el.innerHTML=`<div class="cards" style="margin-bottom:24px"><div class="card"><div class="num">${tc}</div><div class="lbl">Total Courses Completed</div></div><div class="card"><div class="num">${wc}</div><div class="lbl">Students with Courses</div></div></div>
    <div class="chart-container" style="margin-bottom:24px"><h3>Courses by Institution</h3><div class="bar-chart" id="learnInstChart"></div></div>
    <div class="controls"><select id="lI"><option value="all">All Institutions</option>${D.institutions.map(i=>`<option value="${i}">${i}</option>`).join('')}</select><select id="lCo"><option value="all">All Cohorts</option>${(D.cohorts||[]).map(c=>`<option value="${c}">${c}</option>`).join('')}</select><input type="text" id="lS" placeholder="Search by name..."></div>
    <table><thead><tr><th data-col="name">Student <span class="sort-arrow"></span></th><th>Institution</th><th data-col="courses" style="text-align:right">Courses Completed <span class="sort-arrow"></span></th></tr></thead><tbody id="lB"></tbody></table>`;
  let sc='courses',sd='desc';
  // Learn Courses by Institution chart
  const lic = {};
  D.students.forEach(s => { if(s.institution) lic[s.institution]=(lic[s.institution]||0)+(s.courses||0); });
  const lia = Object.entries(lic).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const lmi = lia[0]?lia[0][1]:1;
  document.getElementById('learnInstChart').innerHTML = lia.map(([n,c]) => {
    const sn = n.length>30?n.substring(0,28)+'\u2026':n;
    return `<div class="bar-row"><div class="bar-label" title="${n}">${sn}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(c/lmi*100,8)}%;background:#0073aa">${c}</div></div></div>`;
  }).join('');
  function r(){
    const inst=document.getElementById('lI').value,cohort=document.getElementById('lCo').value,q=document.getElementById('lS').value.toLowerCase();
    let f=D.students.filter(s=>s.wp_username&&s.courses>0);
    if(inst!=='all')f=f.filter(s=>s.institution===inst);
    if(cohort!=='all')f=f.filter(s=>s.cohort===cohort);
    if(q)f=f.filter(s=>s.name.toLowerCase().includes(q)||s.wp_username.toLowerCase().includes(q));
    f.sort((a,b)=>{let va,vb;if(sc==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();}else{va=a.courses||0;vb=b.courses||0;}return va<vb?(sd==='asc'?-1:1):va>vb?(sd==='asc'?1:-1):0;});
    const mx=f.length?Math.max(...f.map(s=>s.courses)):1;
    const tb=document.getElementById('lB');
    if(!f.length){tb.innerHTML='<tr><td colspan="3" class="no-data">No course completions</td></tr>';return;}
    tb.innerHTML=f.map(s=>{
      const nm=`<a class="profile-link" href="https://profiles.wordpress.org/${s.wp_username}/" target="_blank">${s.name}</a>`;
      const bw=Math.max((s.courses/mx)*80,4);
      return `<tr><td>${nm}</td><td>${s.institution}</td><td class="stats-cell has-value"><span class="course-bar" style="width:${bw}px"></span>${s.courses}</td></tr>`;
    }).join('');
    document.querySelectorAll('#sec-learn thead th[data-col]').forEach(th=>{const a=th.querySelector('.sort-arrow');if(a)a.textContent=th.dataset.col===sc?(sd==='asc'?'▲':'▼'):'';});
  }
  document.getElementById('lI').addEventListener('change',r);
  document.getElementById('lCo').addEventListener('change',r);
  document.getElementById('lS').addEventListener('input',r);
  document.querySelectorAll('#sec-learn thead th[data-col]').forEach(th=>{th.addEventListener('click',()=>{const c=th.dataset.col;if(sc===c)sd=sd==='asc'?'desc':'asc';else{sc=c;sd=c==='name'?'asc':'desc';}r();});});
  r();
})();

// ─── SECTION 5: MENTORS ───────────────────────────────
(function(){
  const el=document.getElementById('sec-mentors');
  const sponsored=D.mentors.filter(m=>m.sponsored).length;
  el.innerHTML=`<div class="cards" style="margin-bottom:24px"><div class="card"><div class="num">${D.mentors.length}</div><div class="lbl">Active Mentors</div></div><div class="card"><div class="num">${sponsored}</div><div class="lbl">Sponsored Mentors</div></div></div>
    <div class="controls"><input type="text" id="mS" placeholder="Search by name or country..."></div>
    <table><thead><tr><th>Mentor</th><th>Country</th><th>Languages</th><th>Students</th><th>Sponsored</th></tr></thead><tbody id="mB"></tbody></table>`;
  function r(){
    const q=document.getElementById('mS').value.toLowerCase();
    let f=D.mentors;
    if(q)f=f.filter(m=>m.name.toLowerCase().includes(q)||(m.country_normalized||'').toLowerCase().includes(q));
    f.sort((a,b)=>a.name.localeCompare(b.name));
    const tb=document.getElementById('mB');
    if(!f.length){tb.innerHTML='<tr><td colspan="5" class="no-data">No mentors found</td></tr>';return;}
    tb.innerHTML=f.map(m=>{
      const nm=m.wp_username?`<a class="profile-link" href="https://profiles.wordpress.org/${m.wp_username}/" target="_blank">${m.name}</a>`:m.name;
      const langs=m.languages.length?m.languages.map(l=>`<span class="lang-tag">${l}</span>`).join(' '):'<span class="stats-zero">—</span>';
      // Student list
      let stuHtml='';
      if(m.activeCount+m.gradCount>0){
        const items=[];
        m.activeStudents.forEach(s=>{
          const sn=s.wp_username?`<a class="profile-link s-active" href="https://profiles.wordpress.org/${s.wp_username}/" target="_blank">${s.name}</a>`:`<span class="s-active">${s.name}</span>`;
          items.push(sn);
        });
        m.gradStudents.forEach(s=>{
          const sn=s.wp_username?`<a class="profile-link s-grad" href="https://profiles.wordpress.org/${s.wp_username}/" target="_blank">${s.name}</a>`:`<span class="s-grad">${s.name}</span>`;
          items.push(sn+' <span class="grad-badge">Graduate</span>');
        });
        stuHtml=`<div class="student-list"><strong>${m.activeCount+m.gradCount}</strong> (${m.activeCount} active, ${m.gradCount} grad)<br>${items.join(', ')}</div>`;
      } else {stuHtml='<span class="stats-zero">—</span>';}
      // Sponsored
      let spHtml='';
      if(m.sponsored){
        spHtml=`<span class="sponsored-badge">Yes</span>`;
        if(m.companies.length) spHtml+=` <span style="font-size:12px;color:var(--text-light)">${m.companies.join(', ')}</span>`;
      }
      return `<tr><td>${nm}</td><td>${m.country_normalized||m.country||'—'}</td><td>${langs}</td><td>${stuHtml}</td><td>${spHtml}</td></tr>`;
    }).join('');
  }
  document.getElementById('mS').addEventListener('input',r);
  r();
})();
// Feedback section (aggregate, experience-only)
(function(){
  var fb = D.feedback, el = document.getElementById('sec-feedback');
  if (!el) return;
  if (!fb || !fb.responses) { el.innerHTML = '<div class="chart-container"><h3>Student Feedback</h3><p style="color:var(--text-light)">No feedback yet.</p></div>'; return; }
  var pct = function(o){ return (o && o.pct!=null) ? o.pct+'%' : '—'; };
  var rat = function(o){ return (o && o.avg!=null) ? o.avg.toFixed(1) : '—'; };
  var barW = function(o){ return (o && o.avg!=null) ? Math.round(o.avg/5*100) : 0; };
  var ratingCard = function(title,o){ return '<div class="chart-container"><h3>'+title+'</h3>'
    + '<div style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px">'+rat(o)+' <span style="font-size:13px;color:var(--text-light);font-weight:400">/ 5</span></div>'
    + '<div style="height:6px;border-radius:3px;background:var(--border)"><div style="width:'+barW(o)+'%;height:6px;border-radius:3px;background:#EF9F27"></div></div></div>'; };
  var c = fb.confidence.dist || {}, cn = fb.confidence.n || 1;
  var confOrder = [['Very confident','#0F6E56'],['Confident','#5DCAA5'],['Neutral','#B4B2A9'],['Not very confident','#D85A30']];
  var seg = confOrder.map(function(x){ var v=c[x[0]]||0; return v? '<div style="width:'+(v/cn*100)+'%;background:'+x[1]+'"></div>':''; }).join('');
  var leg = confOrder.map(function(x){ var v=c[x[0]]||0; return '<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:'+x[1]+'"></span>'+x[0]+' '+Math.round(v/cn*100)+'%</span>'; }).join('');
  el.innerHTML = ''
    + '<div class="cards">'
    +   '<div class="card"><div class="num">'+pct(fb.recommend)+'</div><div class="lbl">Would recommend WP Credits</div></div>'
    +   '<div class="card"><div class="num">'+pct(fb.keep)+'</div><div class="lbl">Will keep contributing</div></div>'
    + '</div>'
    + '<div class="charts-row">'
    +   ratingCard('Ease of getting started', fb.ratings.ease)
    +   ratingCard('Project / website satisfaction', fb.ratings.satisfaction)
    +   ratingCard('Perceived impact', fb.ratings.impact)
    + '</div>'
    + '<div class="chart-container"><h3>Confidence contributing</h3>'
    +   '<p style="margin:0 0 8px;font-size:12px;color:var(--text-light)">Asked after picking the contribution team, before contributing begins.</p>'
    +   '<div style="display:flex;height:22px;border-radius:6px;overflow:hidden">'+seg+'</div>'
    +   '<div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12px;color:var(--text-light)">'+leg+'</div></div>'
    + '<p style="font-size:12px;color:var(--text-light);margin-top:12px">Aggregated from '+fb.responses+' anonymous responses — no individual data shown.</p>';
})();
</script>
</body>
